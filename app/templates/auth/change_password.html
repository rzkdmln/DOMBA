<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubah Password | DOMBA - Disdukcapil Garut</title>

    <!-- Tailwind CSS -->
    <script src="{{ url_for('static', filename='js/tailwind.min.js') }}"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 800: '#1e293b', 900: '#0f172a' },
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/css/all.min.css') }}">
    <!-- Google Fonts -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/plus-jakarta-sans/font.css') }}">

    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/sweetalert2/sweetalert2.min.css') }}">

    <!-- Auth Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth/auth_style.css') }}">
</head>
<body class="auth-page">

    <!-- Animated Background Blobs -->
    <div class="bg-blob w-[600px] h-[600px] bg-blue-600 -top-48 -left-48"></div>
    <div class="bg-blob w-[500px] h-[500px] bg-indigo-500 -bottom-24 -right-24" style="animation-delay: 2s;"></div>

    <div class="auth-card">
        <!-- Logo Section -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-[2.5rem] bg-gradient-to-tr from-amber-600 to-amber-400 text-white text-5xl mb-8 shadow-2xl shadow-amber-500/30 transform transition-transform duration-500 hover:rotate-12">
                <i class="fa-solid fa-key"></i>
            </div>
            <h1 class="text-4xl font-black text-slate-800 tracking-tight leading-tight">Ubah Password</h1>
            <p class="text-slate-400 mt-3 font-semibold text-lg px-4 leading-relaxed">Harap perbarui password untuk melanjutkan.</p>
        </div>

        <!-- Change Password Form -->
        <form method="POST" action="{{ url_for('auth.change_password') }}" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="relative group">
                <i class="fa-solid fa-lock absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                <input type="password" name="current_password" class="form-input pl-14 pr-14" placeholder="Password Saat Ini" required autocomplete="current-password">
                <button type="button" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-600 transition-colors toggle-password" data-target="current_password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>

            <div class="relative group">
                <i class="fa-solid fa-key absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                <input type="password" name="new_password" class="form-input pl-14 pr-14" placeholder="Password Baru" required autocomplete="new-password">
                <button type="button" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-600 transition-colors toggle-password" data-target="new_password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>

            <div class="relative group">
                <i class="fa-solid fa-check absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                <input type="password" name="confirm_password" class="form-input pl-14 pr-14" placeholder="Konfirmasi Password" required autocomplete="new-password">
                <button type="button" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-600 transition-colors toggle-password" data-target="confirm_password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>

            <button type="submit" class="auth-btn mt-4" id="submitBtn">
                <span class="text-lg">Simpan Perubahan</span>
                <i class="fa-solid fa-save ml-3"></i>
            </button>
        </form>

        <!-- Footer Links -->
        <div class="mt-12 pt-8 border-t border-slate-100 text-center">
            <a href="{{ url_for('auth.logout') }}" class="text-slate-400 hover:text-red-600 font-bold transition-all flex items-center justify-center group">
                <i class="fa-solid fa-right-from-bracket mr-2 transform group-hover:translate-x-1 transition-transform"></i>
                Keluar Sesi
            </a>
        </div>
    </div>

    <!-- SweetAlert2 JS -->
    <script src="{{ url_for('static', filename='vendor/sweetalert2/sweetalert2.all.min.js') }}"></script>

    <!-- SweetAlert2 Integration -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div id="sweetalert-data"
                     data-category="{{ category }}"
                     data-message="{{ message }}"
                     data-dashboard-url="{{ url_for('admin.dashboard') if current_user.role == 'admin_dinas' else url_for('operator.dashboard') }}"
                     style="display: none;"></div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <script src="{{ url_for('static', filename='js/auth/auth_logic.js') }}"></script>
</body>
</html>
