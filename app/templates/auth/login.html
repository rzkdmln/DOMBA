<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DOMBA - Disdukcapil Garut</title>

    <!-- Tailwind CSS -->
    <script src="{{ url_for('static', filename='js/tailwind.min.js') }}"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 800: '#1e293b', 900: '#0f172a' },
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/css/all.min.css') }}">
    <!-- Google Fonts -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/plus-jakarta-sans/font.css') }}">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/domba.ico') }}">

    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/sweetalert2/sweetalert2.min.css') }}">

    <!-- Auth Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth/auth_style.css') }}">
</head>
<body class="auth-page">

    <!-- Animated Background Blobs Wrapper -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="bg-blob w-[600px] h-[600px] bg-blue-600 -top-48 -left-48"></div>
        <div class="bg-blob w-[500px] h-[500px] bg-indigo-500 -bottom-24 -right-24" style="animation-delay: 2s;"></div>
    </div>

    <div class="auth-card">
        <!-- Logo Section -->
        <div class="text-center mb-10">
            <img src="{{ url_for('static', filename='img/domba-logo.png') }}" alt="DOMBA Logo" style="pointer-events: none;" class="mb-4 block mx-auto auth-logo">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight leading-tight">Masuk Petugas</h1>
        </div>

        <!-- Login Form -->
        <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="relative group">
                <i class="fa-solid fa-user absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                <input type="text" id="username" name="username" class="form-input pl-14" placeholder="Username" required autocomplete="username">
            </div>

            <div class="relative group">
                <i class="fa-solid fa-lock absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                <input type="password" id="password" name="password" class="form-input pl-14 pr-14" placeholder="Password" required="" autocomplete="current-password">
                <button type="button" id="togglePassword" class="toggle-password absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-600 transition-colors" data-target="password" aria-label="Toggle password visibility">
                    <i class="fa-solid fa-eye" id="passwordIcon"></i>
                </button>
            </div>

            <!-- Captcha Field -->
            <div class="relative group">
                <i class="fa-solid fa-calculator absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                <input type="number" id="captcha_answer" name="captcha_answer" class="form-input pl-14" placeholder="Berapa {{ session.get('captcha_question', '?') }} ?" required>
            </div>

            <button type="submit" class="auth-btn mt-4" id="submitBtn">
                <span class="text-lg">Masuk</span>
            </button>
        </form>

        <!-- Footer Links -->
        <div class="mt-12 pt-8 border-t border-slate-100 text-center">
            <a href="{{ url_for('public.index') }}" class="text-slate-400 hover:text-blue-600 font-bold transition-all flex items-center justify-center group">
                <i class="fa-solid fa-chevron-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i>
                Kembali ke Beranda
            </a>
        </div>
    </div>

    <!-- SweetAlert2 JS -->
    <script src="{{ url_for('static', filename='vendor/sweetalert2/sweetalert2.all.min.js') }}"></script>

    <!-- SweetAlert2 Integration -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div id="sweetalert-data"
                     data-category="{{ category }}"
                     data-message="{{ message }}"
                     data-dashboard-url="{{ url_for('admin.dashboard') }}"
                     style="display: none;"></div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <script src="{{ url_for('static', filename='js/auth/auth_logic.js') }}"></script>
</body>
</html>
