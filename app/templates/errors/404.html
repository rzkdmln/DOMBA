<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan | DOMBA</title>
    <script src="{{ url_for('static', filename='js/tailwind.min.js') }}"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 800: '#1e293b', 900: '#0f172a' },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/plus-jakarta-sans/font.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/domba.ico') }}">

    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #f8fafc;
            overflow: hidden;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2.5rem;
            padding: 4rem 2.5rem;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: #1e293b;
            position: relative;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">404</div>
        <div class="relative z-10">
            <div class="mb-8 flex justify-center">
                <div class="w-24 h-24 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center text-5xl shadow-inner">
                    <i class="fa-solid fa-map-signs"></i>
                </div>
            </div>
            
            <h1 class="text-3xl font-black mb-4 tracking-tight">Opps! Tersesat?</h1>
            <p class="text-slate-500 font-medium mb-12 leading-relaxed">
                Halaman yang Anda cari tidak dapat ditemukan. Mungkin link sudah usang atau ada kesalahan pengetikan alamat.
            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="{{ url_for('public.index') }}" class="px-8 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-xl shadow-blue-500/30 hover:bg-blue-700 transition-all transform hover:-translate-y-1 flex items-center justify-center">
                    <i class="fa-solid fa-house mr-2"></i> Beranda
                </a>
                <a href="javascript:history.back()" class="px-8 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all flex items-center justify-center">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Kembali
                </a>
            </div>
            
            <div class="mt-12 pt-8 border-t border-slate-100 flex items-center justify-center space-x-2 text-slate-400">
                <img src="{{ url_for('static', filename='img/domba-logo.png') }}" class="w-5 h-5 grayscale opacity-50" alt="Logo">
                <span class="text-[10px] font-black uppercase tracking-widest">Sistem Monitoring DOMBA</span>
            </div>
        </div>
    </div>
</body>
</html>
