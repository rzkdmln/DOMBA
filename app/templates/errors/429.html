<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terlalu Banyak Permintaan | DOMBA</title>
    <!-- Tailwind CSS -->
    <script src="{{ url_for('static', filename='js/tailwind.min.js') }}"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 800: '#1e293b', 900: '#0f172a' },
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/plus-jakarta-sans/font.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/domba.ico') }}">

    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #f8fafc;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2.5rem;
            padding: 3.5rem 2.5rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: #1e293b;
        }
        .timer-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2rem auto;
            border: 4px solid #3b82f6;
            position: relative;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .icon-pulse {
            animation: pulse-red 2s infinite;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="mb-6 flex justify-center">
            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-3xl flex items-center justify-center text-4xl icon-pulse">
                <i class="fa-solid fa-hourglass-half"></i>
            </div>
        </div>
        
        <h1 class="text-3xl font-black mb-4 tracking-tight">Terlalu Cepat!</h1>
        <p class="text-slate-500 font-medium mb-8">
            Wah, sepertinya Anda melakukan aksi terlalu cepat. Demi keamanan, sistem membatasi akses Anda sejenak. Mohon menunggu beberapa saat sebelum mencoba lagi.
        </p>

        <div class="timer-circle">
            <span id="countdown" class="text-4xl font-black text-blue-600">60</span>
        </div>

        <p class="text-sm text-slate-400 font-bold uppercase tracking-widest mt-6">
            Halaman akan memuat ulang otomatis
        </p>
        
        <div class="mt-10 pt-8 border-t border-slate-100 italic text-xs text-slate-400">
            Sistem Keamanan DOMBA - Disdukcapil Garut
        </div>
    </div>

    <script>
        // Default countdown duration in seconds
        let seconds = 60;
        const countdownEl = document.getElementById('countdown');

        const timer = setInterval(() => {
            seconds--;
            countdownEl.innerText = seconds;

            if (seconds <= 0) {
                clearInterval(timer);
                // Return to login page
                window.location.href = "/auth/login";
            }
        }, 1000);
    </script>
</body>
</html>
